services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: janus
      POSTGRES_PASSWORD: janus
      POSTGRES_DB: janus
    ports:
      - "5432:5432"
    volumes:
      - janus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U janus"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # AOF persistence, fsync on every write — janus:spend:float_total is the hard,
    # non-negotiable ceiling (PRD §7.3); losing it to an unpersisted restart would silently
    # reset it to 0, defeating the whole point. `everysec` (Redis's own default once AOF is
    # on) would be fine for most data; this one's worth the extra fsync cost.
    command: redis-server --appendonly yes --appendfsync always
    ports:
      - "6379:6379"
    volumes:
      - janus_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  janus_postgres_data:
  janus_redis_data:
